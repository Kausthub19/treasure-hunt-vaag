<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Treasure Hunt Puzzles</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #f5f0e1, #e6d7b8);
            color: #333;
            margin: 0;
            padding: 0;
        }
        header {
            background: #b8860b;
            color: white;
            padding: 1rem;
            text-align: center;
        }
        .compass {
            width: 60px;
            height: 60px;
            vertical-align: middle;
            margin-right: 0.5rem;
        }
        .puzzle {
            display: none;
            padding: 2rem;
        }
        .visible {
            display: block;
        }
        input[type=text] {
            padding: 0.5rem;
            font-size: 1rem;
        }
        button {
            padding: 0.5rem 1rem;
            font-size: 1rem;
            margin-left: 0.5rem;
            cursor: pointer;
        }
        .clue {
            margin-top: 1rem;
            font-weight: bold;
            color: green;
        }
    </style>
</head>
<body>
<header>
    <svg class="compass" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <circle cx="50" cy="50" r="48" stroke="#333" stroke-width="4" fill="#fff" />
        <polygon points="50,10 58,50 50,45 42,50" fill="#b8860b" />
        <polygon points="50,90 58,50 50,55 42,50" fill="#333" />
    </svg>
    <span>Treasure Hunt</span>
</header>

<!-- Puzzle section -->
<section id="puzzle" class="puzzle visible">
    <h2>Riddle</h2>
    <p>Riddle text goes here.</p>
    <input id="answer" type="text" placeholder="Type your answer" />
    <button onclick="checkAnswer()">Submit</button>
    <div id="feedback"></div>
</section>

<script>
function checkAnswer() {
    const user = document.getElementById('answer').value.trim().toLowerCase();
    const feedback = document.getElementById('feedback');
    if (user === 'answer1') {
        feedback.innerHTML = '<div class="clue">Congratulations!\nYour clue: clue 1</div>';
    } else {
        feedback.textContent = 'Incorrect, try again.';
    }
}
</script>
</body>
</html>
